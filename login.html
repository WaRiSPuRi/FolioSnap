<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Profilr</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0a0a0a; --surface: #111; --surface2: #1a1a1a; --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.18); --text: #f0ede8; --muted: #888580; --accent: #e8d5a0; --accent2: #c4a96b; --rs: 8px; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; line-height: 1.7; min-height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 2.5rem; border-bottom: 1px solid var(--border); }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; color: var(--accent); text-decoration: none; }
    .back { font-size: 0.82rem; color: var(--muted); text-decoration: none; }
    .back:hover { color: var(--text); }
    .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
    .wrap { width: 100%; max-width: 400px; }
    .title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.6rem; letter-spacing: -0.03em; margin-bottom: 0.35rem; }
    .sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 2rem; }
    .tabs { display: flex; gap: 4px; margin-bottom: 1.75rem; background: var(--surface2); border-radius: var(--rs); padding: 4px; }
    .tab { flex: 1; padding: 8px; border-radius: 6px; border: none; background: transparent; color: var(--muted); font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.15s; }
    .tab.on { background: var(--surface); color: var(--text); }
    .pane { display: none; }
    .pane.on { display: block; }
    .fl { display: block; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
    .fi { width: 100%; padding: 11px 13px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--rs); color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.15s; margin-bottom: 1.1rem; display: block; }
    .fi:focus { border-color: var(--accent2); }
    .fi::placeholder { color: var(--muted); }
    .sbtn { width: 100%; padding: 12px; background: var(--accent); color: #0a0a0a; border: none; border-radius: var(--rs); font-family: 'Inter', sans-serif; font-size: 0.92rem; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 0.5rem; }
    .sbtn:hover:not(:disabled) { background: var(--accent2); }
    .sbtn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { font-size: 0.82rem; text-align: center; margin-top: 1rem; min-height: 20px; }
    .msg.err { color: #f87171; }
    .msg.ok { color: #4ade80; }
    .sp { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(0,0,0,0.25); border-top-color: #0a0a0a; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<nav>
  <a class="logo" href="/">Profilr</a>
  <a class="back" href="/">← Back to home</a>
</nav>
<div class="page">
  <div class="wrap">
    <div class="title" id="ttl">Welcome back</div>
    <div class="sub" id="sub">Sign in to your Profilr account</div>
    <div class="tabs">
      <button class="tab on" id="tl" onclick="sw('login')">Sign in</button>
      <button class="tab" id="ts" onclick="sw('signup')">Create account</button>
    </div>
    <div class="pane on" id="pl">
      <label class="fl">Email</label>
      <input class="fi" type="email" id="le" placeholder="you@example.com" />
      <label class="fl">Password</label>
      <input class="fi" type="password" id="lp" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" />
      <button class="sbtn" id="lb" onclick="doLogin()">Sign in</button>
      <div class="msg" id="lm"></div>
    </div>
    <div class="pane" id="ps">
      <label class="fl">Email</label>
      <input class="fi" type="email" id="se" placeholder="you@example.com" />
      <label class="fl">Password</label>
      <input class="fi" type="password" id="sp2" placeholder="At least 6 characters" onkeydown="if(event.key==='Enter')doSignup()" />
      <button class="sbtn" id="sb" onclick="doSignup()">Create account</button>
      <div class="msg" id="sm"></div>
    </div>
  </div>
</div>
<script>
  var _sb = window.supabase.createClient(
    'https://aoagptbyrvigckrxexru.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvYWdwdGJ5cnZpZ2NrcnhleHJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2OTMzODMsImV4cCI6MjA5MTI2OTM4M30.oz3dkZj3mFea5Euit8dXwpwiOcWC_59GodzvueMiKbM'
  );
  _sb.auth.getSession().then(function(r){ if(r.data&&r.data.session) window.location.href='/dashboard.html'; });
  if(window.location.hash==='#signup') sw('signup');
  function sw(t){
    var l=t==='login';
    document.getElementById('tl').classList.toggle('on',l);
    document.getElementById('ts').classList.toggle('on',!l);
    document.getElementById('pl').classList.toggle('on',l);
    document.getElementById('ps').classList.toggle('on',!l);
    document.getElementById('ttl').textContent=l?'Welcome back':'Create your account';
    document.getElementById('sub').textContent=l?'Sign in to your Profilr account':'Free forever — no credit card needed';
  }
  async function doLogin(){
    var e=document.getElementById('le').value.trim(), p=document.getElementById('lp').value;
    var btn=document.getElementById('lb'), msg=document.getElementById('lm');
    msg.textContent='';
    if(!e||!p){msg.textContent='Please fill in all fields.';msg.className='msg err';return;}
    btn.disabled=true; btn.innerHTML='<span class="sp"></span>Signing in…';
    var r=await _sb.auth.signInWithPassword({email:e,password:p});
    if(r.error){msg.textContent=r.error.message;msg.className='msg err';btn.disabled=false;btn.textContent='Sign in';}
    else window.location.href='/dashboard.html';
  }
  async function doSignup(){
    var e=document.getElementById('se').value.trim(), p=document.getElementById('sp2').value;
    var btn=document.getElementById('sb'), msg=document.getElementById('sm');
    msg.textContent='';
    if(!e||!p){msg.textContent='Please fill in all fields.';msg.className='msg err';return;}
    if(p.length<6){msg.textContent='Password must be at least 6 characters.';msg.className='msg err';return;}
    btn.disabled=true; btn.innerHTML='<span class="sp"></span>Creating account…';
    var r=await _sb.auth.signUp({email:e,password:p,options:{emailRedirectTo:window.location.origin+'/dashboard.html'}});
    if(r.error){msg.textContent=r.error.message;msg.className='msg err';btn.disabled=false;btn.textContent='Create account';}
    else{msg.textContent='✓ Check your email to confirm, then sign in here.';msg.className='msg ok';btn.disabled=false;btn.textContent='Create account';}
  }
</script>
</body>
</html>
