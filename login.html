<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — FolioSnap</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111; --surface2: #1a1a1a;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.18);
      --text: #f0ede8; --muted: #888580; --accent: #e8d5a0; --accent2: #c4a96b;
      --r: 12px; --rs: 8px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; line-height: 1.7; min-height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 2.5rem; border-bottom: 1px solid var(--border); }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; color: var(--accent); text-decoration: none; }
    .nav-back { font-size: 0.82rem; color: var(--muted); text-decoration: none; }
    .nav-back:hover { color: var(--text); }

    .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
    .auth-wrap { width: 100%; max-width: 400px; }
    .auth-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.6rem; letter-spacing: -0.03em; margin-bottom: 0.35rem; }
    .auth-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 2rem; }

    .auth-tabs { display: flex; gap: 4px; margin-bottom: 1.75rem; background: var(--surface2); border-radius: var(--rs); padding: 4px; }
    .auth-tab { flex: 1; padding: 8px; border-radius: 6px; border: none; background: transparent; color: var(--muted); font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.15s; }
    .auth-tab.active { background: var(--surface); color: var(--text); }

    .form-pane { display: none; }
    .form-pane.active { display: block; }

    .form-field { margin-bottom: 1.1rem; }
    .form-label { display: block; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
    .form-input { width: 100%; padding: 11px 13px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--rs); color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.15s; }
    .form-input:focus { border-color: var(--accent2); }
    .form-input::placeholder { color: var(--muted); }

    .btn-submit { width: 100%; padding: 12px; background: var(--accent); color: #0a0a0a; border: none; border-radius: var(--rs); font-family: 'Inter', sans-serif; font-size: 0.92rem; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 0.5rem; }
    .btn-submit:hover:not(:disabled) { background: var(--accent2); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-msg { font-size: 0.82rem; text-align: center; margin-top: 1rem; min-height: 20px; padding: 0 4px; }
    .auth-msg.error { color: #f87171; }
    .auth-msg.success { color: #4ade80; }

    .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(0,0,0,0.25); border-top-color: #0a0a0a; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="/">FolioSnap</a>
  <a class="nav-back" href="/">← Back to home</a>
</nav>

<div class="page">
  <div class="auth-wrap">
    <div class="auth-title" id="auth-title">Welcome back</div>
    <div class="auth-sub" id="auth-sub">Sign in to your FolioSnap account</div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login-btn" onclick="switchTab('login')">Sign in</button>
      <button class="auth-tab" id="tab-signup-btn" onclick="switchTab('signup')">Create account</button>
    </div>

    <!-- LOGIN -->
    <div class="form-pane active" id="pane-login">
      <div class="form-field">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="login-email" placeholder="you@example.com" />
      </div>
      <div class="form-field">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()" />
      </div>
      <button class="btn-submit" id="login-btn" onclick="doLogin()">Sign in</button>
      <div class="auth-msg" id="login-msg"></div>
    </div>

    <!-- SIGNUP -->
    <div class="form-pane" id="pane-signup">
      <div class="form-field">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="signup-email" placeholder="you@example.com" />
      </div>
      <div class="form-field">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="signup-password" placeholder="At least 6 characters" onkeydown="if(event.key==='Enter') doSignup()" />
      </div>
      <button class="btn-submit" id="signup-btn" onclick="doSignup()">Create account</button>
      <div class="auth-msg" id="signup-msg"></div>
    </div>
  </div>
</div>

<script>
  var _sb = window.supabase.createClient(
    'https://aoagptbyrvigckrxexru.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvYWdwdGJ5cnZpZ2NrcnhleHJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2OTMzODMsImV4cCI6MjA5MTI2OTM4M30.oz3dkZj3mFea5Euit8dXwpwiOcWC_59GodzvueMiKbM'
  );

  // Check if already logged in
  _sb.auth.getSession().then(function(res) {
    if (res.data && res.data.session) {
      window.location.href = '/dashboard.html';
    }
  });

  // Check URL hash for signup tab
  if (window.location.hash === '#signup') {
    switchTab('signup');
  }

  function switchTab(tab) {
    var isLogin = tab === 'login';
    document.getElementById('tab-login-btn').classList.toggle('active', isLogin);
    document.getElementById('tab-signup-btn').classList.toggle('active', !isLogin);
    document.getElementById('pane-login').classList.toggle('active', isLogin);
    document.getElementById('pane-signup').classList.toggle('active', !isLogin);
    document.getElementById('auth-title').textContent = isLogin ? 'Welcome back' : 'Create your account';
    document.getElementById('auth-sub').textContent = isLogin ? 'Sign in to your FolioSnap account' : 'Free forever — no credit card needed';
  }

  async function doLogin() {
    var email = document.getElementById('login-email').value.trim();
    var password = document.getElementById('login-password').value;
    var btn = document.getElementById('login-btn');
    var msg = document.getElementById('login-msg');
    msg.textContent = '';
    if (!email || !password) { msg.textContent = 'Please fill in all fields.'; msg.className = 'auth-msg error'; return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in…';
    var result = await _sb.auth.signInWithPassword({ email: email, password: password });
    if (result.error) {
      msg.textContent = result.error.message;
      msg.className = 'auth-msg error';
      btn.disabled = false;
      btn.textContent = 'Sign in';
    } else {
      window.location.href = '/dashboard.html';
    }
  }

  async function doSignup() {
    var email = document.getElementById('signup-email').value.trim();
    var password = document.getElementById('signup-password').value;
    var btn = document.getElementById('signup-btn');
    var msg = document.getElementById('signup-msg');
    msg.textContent = '';
    if (!email || !password) { msg.textContent = 'Please fill in all fields.'; msg.className = 'auth-msg error'; return; }
    if (password.length < 6) { msg.textContent = 'Password must be at least 6 characters.'; msg.className = 'auth-msg error'; return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Creating account…';
    var result = await _sb.auth.signUp({ email: email, password: password });
    if (result.error) {
      msg.textContent = result.error.message;
      msg.className = 'auth-msg error';
      btn.disabled = false;
      btn.textContent = 'Create account';
    } else {
      msg.textContent = '✓ Account created! Check your email to confirm, then sign in.';
      msg.className = 'auth-msg success';
      btn.disabled = false;
      btn.textContent = 'Create account';
    }
  }
</script>
</body>
</html>
