<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — FolioSnap</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fff; --surface: #f8f8f7; --surface2: #f0efed;
      --border: #e5e4e0; --text: #1a1917; --muted: #6b6a66;
      --subtle: #9b9a96; --link: #2563eb; --r: 12px; --rs: 6px; --sidebar: 260px;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.7; }

    .loading { display:flex; align-items:center; justify-content:center; min-height:100vh; color:var(--muted); font-size:0.9rem; }
    .not-found { display:none; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:2rem; }
    .not-found h1 { font-family:'Syne',sans-serif; font-size:2rem; font-weight:800; margin-bottom:0.5rem; }
    .not-found p { color:var(--muted); }
    .not-found a { margin-top:1rem; color:var(--link); }

    .layout { display:flex; min-height:100vh; max-width:900px; margin:0 auto; padding:0 1.5rem; }
    .sidebar { width:var(--sidebar); flex-shrink:0; padding:4rem 2rem 4rem 0; position:sticky; top:0; height:100vh; overflow-y:auto; display:flex; flex-direction:column; gap:2rem; }
    .avatar { width:48px; height:48px; border-radius:50%; background:var(--text); display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-weight:800; font-size:0.9rem; color:var(--bg); margin-bottom:0.5rem; }
    .sb-name { font-family:'Syne',sans-serif; font-weight:800; font-size:1.15rem; letter-spacing:-0.02em; line-height:1.2; margin-bottom:0.25rem; }
    .sb-role { font-size:0.82rem; color:var(--muted); margin-bottom:0.15rem; }
    .sb-row { display:flex; align-items:center; gap:6px; font-size:0.78rem; color:var(--muted); margin-top:3px; }
    .dot { width:6px; height:6px; border-radius:50%; background:#22c55e; flex-shrink:0; animation:blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
    .nav-label { font-size:0.68rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--subtle); margin-bottom:6px; }
    .nav-links { display:flex; flex-direction:column; gap:2px; }
    .nav-a { display:flex; align-items:center; gap:8px; padding:5px 8px; border-radius:var(--rs); font-size:0.85rem; color:var(--muted); text-decoration:none; transition:all 0.15s; }
    .nav-a:hover, .nav-a.active { background:var(--surface2); color:var(--text); }
    .social-row { display:flex; gap:8px; flex-wrap:wrap; }
    .social-a { display:flex; align-items:center; gap:5px; font-size:0.78rem; color:var(--muted); text-decoration:none; padding:4px 10px; border:1px solid var(--border); border-radius:var(--rs); transition:all 0.15s; }
    .social-a:hover { border-color:var(--text); color:var(--text); }

    .main { flex:1; padding:4rem 0 6rem 2.5rem; border-left:1px solid var(--border); min-width:0; }
    .section { margin-bottom:4rem; }
    .sec-h { font-family:'Syne',sans-serif; font-size:1.3rem; font-weight:800; letter-spacing:-0.02em; margin-bottom:1.25rem; padding-bottom:0.75rem; border-bottom:1px solid var(--border); }

    .about-p { color:var(--muted); line-height:1.85; font-size:0.92rem; margin-bottom:0.75rem; }

    .tl { display:flex; flex-direction:column; }
    .tl-item { display:flex; gap:1rem; padding:1rem; border-radius:var(--r); transition:background 0.15s; }
    .tl-item:hover { background:var(--surface); }
    .tl-logo { width:36px; height:36px; border-radius:8px; background:var(--surface2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.7rem; color:var(--text); flex-shrink:0; margin-top:2px; }
    .tl-body { flex:1; min-width:0; }
    .tl-top { display:flex; align-items:baseline; justify-content:space-between; gap:1rem; flex-wrap:wrap; }
    .tl-name { font-weight:500; font-size:0.9rem; }
    .tl-date { font-size:0.78rem; color:var(--subtle); white-space:nowrap; }
    .tl-role { font-size:0.82rem; color:var(--muted); margin-top:1px; }
    .tl-desc { font-size:0.82rem; color:var(--muted); margin-top:5px; line-height:1.65; white-space:pre-line; }

    .proj-list { display:flex; flex-direction:column; }
    .proj-item { display:flex; align-items:flex-start; gap:1rem; padding:1rem; border-radius:var(--r); transition:background 0.15s; }
    .proj-item:hover { background:var(--surface); }
    .proj-ico { width:36px; height:36px; border-radius:8px; background:var(--surface2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.7rem; color:var(--muted); flex-shrink:0; margin-top:2px; }
    .proj-body { flex:1; min-width:0; }
    .proj-top { display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:0.5rem; }
    .proj-name { font-weight:500; font-size:0.9rem; }
    .proj-dates { font-size:0.78rem; color:var(--subtle); }
    .proj-desc { font-size:0.82rem; color:var(--muted); margin-top:3px; line-height:1.6; }
    .proj-tags { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
    .tag { padding:2px 8px; background:var(--surface2); border-radius:4px; font-size:0.72rem; color:var(--muted); font-weight:500; }
    .proj-links { display:flex; gap:8px; margin-top:8px; }
    .plink { font-size:0.78rem; color:var(--link); text-decoration:none; }
    .plink:hover { text-decoration:underline; }

    .skills-wrap { display:flex; flex-wrap:wrap; gap:6px; }
    .sk { padding:4px 10px; background:var(--surface); border:1px solid var(--border); border-radius:100px; font-size:0.78rem; color:var(--text); }

    .rtabs { display:flex; gap:4px; margin-bottom:1.5rem; }
    .rtab { padding:6px 14px; border-radius:var(--rs); font-size:0.82rem; font-weight:500; cursor:pointer; border:1px solid transparent; background:transparent; color:var(--muted); transition:all 0.15s; font-family:'Inter',sans-serif; }
    .rtab.active { background:var(--text); color:var(--bg); }
    .rtab:not(.active):hover { background:var(--surface2); color:var(--text); }
    .rpane { display:none; }
    .rpane.on { display:block; }
    .r-head { margin-bottom:1.5rem; }
    .r-head h2 { font-family:'Syne',sans-serif; font-size:1.3rem; font-weight:800; letter-spacing:-0.02em; margin-bottom:4px; }
    .r-contact { display:flex; flex-wrap:wrap; gap:12px; font-size:0.8rem; color:var(--muted); margin-top:6px; }
    .r-contact a { color:var(--link); text-decoration:none; }
    .r-block { margin-bottom:1.75rem; }
    .r-block-title { font-size:0.7rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--subtle); margin-bottom:0.6rem; padding-bottom:0.35rem; border-bottom:1px solid var(--border); }
    .r-entry { margin-bottom:1.1rem; }
    .r-etop { display:flex; justify-content:space-between; flex-wrap:wrap; gap:0.5rem; }
    .r-ename { font-weight:500; font-size:0.88rem; }
    .r-edate { font-size:0.78rem; color:var(--subtle); }
    .r-esub { font-size:0.82rem; color:var(--muted); margin-top:2px; }
    .r-edesc { font-size:0.82rem; color:var(--muted); margin-top:4px; line-height:1.65; white-space:pre-line; }

    .dl-bar { display:flex; align-items:center; justify-content:space-between; padding:0.75rem 1rem; background:var(--surface); border:1px solid var(--border); border-radius:var(--rs); font-size:0.82rem; color:var(--muted); }
    .dl-btn { padding:5px 14px; background:var(--text); color:var(--bg); border:none; border-radius:var(--rs); font-size:0.78rem; font-weight:500; cursor:pointer; text-decoration:none; }

    .contact-note { font-size:0.88rem; color:var(--muted); margin-bottom:1.25rem; line-height:1.7; }
    .contact-note a { color:var(--link); }
    .contact-grid { display:flex; gap:8px; flex-wrap:wrap; }
    .contact-a { display:flex; align-items:center; gap:6px; padding:7px 14px; border:1px solid var(--border); border-radius:var(--rs); font-size:0.82rem; color:var(--text); text-decoration:none; transition:all 0.15s; }
    .contact-a:hover { border-color:var(--text); background:var(--surface); }

    @media (max-width:680px) {
      .layout { flex-direction:column; padding:0 1rem; }
      .sidebar { width:100%; height:auto; position:static; padding:2.5rem 0 1.5rem; border-bottom:1px solid var(--border); }
      .main { padding:2rem 0 4rem; border-left:none; }
    }
  </style>
</head>
<body>

<div id="loading" class="loading">Loading portfolio…</div>
<div id="not-found" class="not-found">
  <h1>404</h1>
  <p>This portfolio doesn't exist.</p>
  <a href="/">← Go home</a>
</div>
<div id="portfolio"></div>

<script>
  var _sb = window.supabase.createClient(
    'https://aoagptbyrvigckrxexru.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvYWdwdGJ5cnZpZ2NrcnhleHJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2OTMzODMsImV4cCI6MjA5MTI2OTM4M30.oz3dkZj3mFea5Euit8dXwpwiOcWC_59GodzvueMiKbM'
  );

  function ini(n) {
    return (n||'?').split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);
  }

  async function load() {
    var parts = window.location.pathname.split('/portfolio/');
    var slug = parts[1] ? parts[1].replace(/\/$/,'') : null;

    // Preview mode — load by user id from session
    if (!slug || slug === 'preview') {
      var sess = await _sb.auth.getSession();
      if (sess.data && sess.data.session) {
        var res2 = await _sb.from('portfolios').select('content').eq('user_id', sess.data.session.user.id).maybeSingle();
        if (res2.data) { render(res2.data.content); return; }
      }
      show404(); return;
    }

    var res = await _sb.from('portfolios').select('content').eq('slug', slug).maybeSingle();
    if (!res.data) { show404(); return; }
    render(res.data.content);
  }

  function show404() {
    document.getElementById('loading').style.display='none';
    document.getElementById('not-found').style.display='flex';
  }

  function render(d) {
    document.getElementById('loading').style.display='none';
    var p = d.profile||{}, c = d.contact||{};
    var name = p.name||'Portfolio';
    document.title = name + ' — FolioSnap';

    var hasExp  = (d.experience||[]).length > 0;
    var hasProj = (d.projects||[]).length > 0;
    var hasEdu  = (d.education||[]).length > 0;
    var hasSk   = (d.skills||[]).length > 0 || (d.languages||[]).length > 0;
    var hasRes  = !!d.resumeUrl;
    var hasCon  = !!(c.email||c.linkedin||c.github||c.twitter||c.phone);

    var navItems = [
      {id:'about',label:'About',icon:'◎'},
      hasExp  && {id:'experience',label:'Experience',icon:'◈'},
      hasProj && {id:'projects',label:'Projects',icon:'◉'},
      hasEdu  && {id:'education',label:'Education',icon:'◇'},
      hasSk   && {id:'skills',label:'Skills',icon:'⬡'},
      hasRes  && {id:'resume',label:'Resume',icon:'□'},
      hasCon  && {id:'contact',label:'Contact',icon:'◌'},
    ].filter(Boolean);

    var socials = [
      c.email    && '<a href="mailto:'+c.email+'" class="social-a">✉ Email</a>',
      c.linkedin && '<a href="'+c.linkedin+'" target="_blank" class="social-a">in LinkedIn</a>',
      c.github   && '<a href="'+c.github+'" target="_blank" class="social-a">⌥ GitHub</a>',
      c.twitter  && '<a href="'+c.twitter+'" target="_blank" class="social-a">𝕏 Twitter</a>',
    ].filter(Boolean).join('');

    var html = '<div class="layout">'
      + '<aside class="sidebar">'
      +   '<div>'
      +     '<div class="avatar">'+ini(name)+'</div>'
      +     '<div class="sb-name">'+name+'</div>'
      +     (p.role ? '<div class="sb-role">'+p.role+'</div>' : '')
      +     (p.status ? '<div class="sb-row"><span class="dot"></span><span>'+p.status+'</span></div>' : '')
      +     (p.location ? '<div class="sb-row"><span style="font-size:11px">📍</span><span>'+p.location+'</span></div>' : '')
      +   '</div>'
      +   '<nav><div class="nav-label">Navigate</div><div class="nav-links">'
      +     navItems.map(function(l){ return '<a class="nav-a" href="#'+l.id+'"><span>'+l.icon+'</span> '+l.label+'</a>'; }).join('')
      +   '</div></nav>'
      +   (socials ? '<div><div class="nav-label" style="margin-bottom:8px;">Connect</div><div class="social-row">'+socials+'</div></div>' : '')
      + '</aside>'
      + '<main class="main">'
      +   renderAbout(d)
      +   (hasExp  ? renderExp(d.experience)  : '')
      +   (hasProj ? renderProj(d.projects)   : '')
      +   (hasEdu  ? renderEdu(d)             : '')
      +   (hasSk   ? renderSkills(d)          : '')
      +   (hasRes  ? renderResume(d,p,c)      : '')
      +   (hasCon  ? renderContact(c)         : '')
      + '</main></div>';

    document.getElementById('portfolio').innerHTML = html;
    scrollSpy(navItems.map(function(l){return l.id;}));
  }

  function renderAbout(d) {
    var summary = d.summary||'';
    var paras = summary.split('\n').filter(Boolean).map(function(t){ return '<p class="about-p">'+t+'</p>'; }).join('');
    return '<section id="about" class="section"><h2 class="sec-h">About</h2>'+(paras||'<p class="about-p" style="color:var(--subtle)">No summary yet.</p>')+'</section>';
  }

  function renderExp(items) {
    return '<section id="experience" class="section"><h2 class="sec-h">Experience</h2><div class="tl">'
      + items.map(function(e){
          return '<div class="tl-item"><div class="tl-logo">'+ini(e.org)+'</div><div class="tl-body">'
            +'<div class="tl-top"><span class="tl-name">'+(e.org||'')+'</span><span class="tl-date">'+(e.date||'')+'</span></div>'
            +'<div class="tl-role">'+[e.role,e.location].filter(Boolean).join(' · ')+'</div>'
            +(e.desc?'<div class="tl-desc">'+e.desc+'</div>':'')
            +'</div></div>';
        }).join('')
      + '</div></section>';
  }

  function renderProj(items) {
    return '<section id="projects" class="section"><h2 class="sec-h">Projects</h2><div class="proj-list">'
      + items.map(function(p){
          var links = (p.demo?'<a href="'+p.demo+'" target="_blank" class="plink">↗ Live Demo</a>':'')
                    + (p.github?'<a href="'+p.github+'" target="_blank" class="plink">↗ GitHub</a>':'');
          return '<div class="proj-item"><div class="proj-ico">'+ini(p.name)+'</div><div class="proj-body">'
            +'<div class="proj-top"><span class="proj-name">'+(p.name||'')+'</span><span class="proj-dates">'+(p.date||'')+'</span></div>'
            +'<div class="proj-desc">'+(p.desc||'')+'</div>'
            +(p.tags?'<div class="proj-tags">'+p.tags.split(',').map(function(t){return '<span class="tag">'+t.trim()+'</span>';}).join('')+'</div>':'')
            +(links?'<div class="proj-links">'+links+'</div>':'')
            +'</div></div>';
        }).join('')
      + '</div></section>';
  }

  function renderEdu(d) {
    return '<section id="education" class="section"><h2 class="sec-h">Education</h2><div class="tl">'
      + (d.education||[]).map(function(e){
          return '<div class="tl-item"><div class="tl-logo">'+ini(e.school)+'</div><div class="tl-body">'
            +'<div class="tl-top"><span class="tl-name">'+(e.school||'')+'</span><span class="tl-date">'+(e.date||'')+'</span></div>'
            +(e.degree?'<div class="tl-role">'+e.degree+'</div>':'')
            +(e.desc?'<div class="tl-desc">'+e.desc+'</div>':'')
            +'</div></div>';
        }).join('')
      + '</div></section>';
  }

  function renderSkills(d) {
    var sk = (d.skills||[]).map(function(s){return '<span class="sk">'+s+'</span>';}).join('');
    var ln = (d.languages||[]).map(function(s){return '<span class="sk">'+s+'</span>';}).join('');
    return '<section id="skills" class="section"><h2 class="sec-h">Skills</h2>'
      +(sk?'<div class="skills-wrap" style="margin-bottom:1rem;">'+sk+'</div>':'')
      +(ln?'<div class="nav-label" style="margin-bottom:8px;">Languages</div><div class="skills-wrap">'+ln+'</div>':'')
      +'</section>';
  }

  function renderResume(d,p,c) {
    var exp = (d.experience||[]).map(function(e){
      return '<div class="r-entry"><div class="r-etop"><span class="r-ename">'+(e.role?e.role+' — ':'')+e.org+'</span><span class="r-edate">'+(e.date||'')+'</span></div>'
        +(e.location?'<div class="r-esub">'+e.location+'</div>':'')+(e.desc?'<div class="r-edesc">'+e.desc+'</div>':'')+'</div>';
    }).join('');
    var edu = (d.education||[]).map(function(e){
      return '<div class="r-entry"><div class="r-etop"><span class="r-ename">'+(e.school||'')+'</span><span class="r-edate">'+(e.date||'')+'</span></div>'
        +(e.degree?'<div class="r-esub">'+e.degree+'</div>':'')+(e.desc?'<div class="r-edesc">'+e.desc+'</div>':'')+'</div>';
    }).join('');
    var proj = (d.projects||[]).map(function(p){
      return '<div class="r-entry"><div class="r-etop"><span class="r-ename">'+(p.name||'')+'</span><span class="r-edate">'+(p.date||'')+'</span></div>'
        +(p.desc?'<div class="r-edesc">'+p.desc+'</div>':'')+'</div>';
    }).join('');
    var skills = (d.skills||[]).map(function(s){return '<span class="sk">'+s+'</span>';}).join('');
    var langs  = (d.languages||[]).map(function(s){return '<span class="sk">'+s+'</span>';}).join('');

    return '<section id="resume" class="section"><h2 class="sec-h">Resume</h2>'
      +'<div class="rtabs"><button class="rtab active" onclick="swR(\'view\',this)">View online</button><button class="rtab" onclick="swR(\'dl\',this)">Download PDF</button></div>'
      +'<div id="r-view" class="rpane on">'
      +  '<div class="r-head"><h2>'+(p.name||'')+'</h2><p style="font-size:0.85rem;color:var(--muted);">'+(p.role||'')+(p.location?' · '+p.location:'')+'</p>'
      +  '<div class="r-contact">'+(c.email?'<a href="mailto:'+c.email+'">'+c.email+'</a>':'')+(c.phone?'<span>'+c.phone+'</span>':'')+'</div></div>'
      +  (d.summary?'<div class="r-block"><div class="r-block-title">Summary</div><p style="font-size:0.85rem;color:var(--muted);line-height:1.75;">'+d.summary+'</p></div>':'')
      +  (exp?'<div class="r-block"><div class="r-block-title">Experience</div>'+exp+'</div>':'')
      +  (edu?'<div class="r-block"><div class="r-block-title">Education</div>'+edu+'</div>':'')
      +  (proj?'<div class="r-block"><div class="r-block-title">Projects</div>'+proj+'</div>':'')
      +  (skills?'<div class="r-block"><div class="r-block-title">Skills</div><div class="skills-wrap">'+skills+'</div></div>':'')
      +  (langs?'<div class="r-block"><div class="r-block-title">Languages</div><div class="skills-wrap">'+langs+'</div></div>':'')
      +'</div>'
      +'<div id="r-dl" class="rpane"><div class="dl-bar"><span>Resume — '+(p.name||'Portfolio')+'</span><a href="'+d.resumeUrl+'" target="_blank" download class="dl-btn">⬇ Download PDF</a></div></div>'
      +'</section>';
  }

  function renderContact(c) {
    var links = [
      c.email  && '<a href="mailto:'+c.email+'" class="contact-a">✉ '+c.email+'</a>',
      c.phone  && '<a href="tel:'+c.phone+'" class="contact-a">📞 '+c.phone+'</a>',
      c.linkedin && '<a href="'+c.linkedin+'" target="_blank" class="contact-a">in LinkedIn</a>',
      c.github   && '<a href="'+c.github+'" target="_blank" class="contact-a">⌥ GitHub</a>',
      c.twitter  && '<a href="'+c.twitter+'" target="_blank" class="contact-a">𝕏 Twitter</a>',
      c.website  && '<a href="'+c.website+'" target="_blank" class="contact-a">🌐 Website</a>',
    ].filter(Boolean).join('');
    return '<section id="contact" class="section"><h2 class="sec-h">Contact</h2>'
      +'<p class="contact-note">Feel free to reach out'+(c.email?' — <a href="mailto:'+c.email+'">send an email</a>':'')+' and I\'ll get back to you.</p>'
      +'<div class="contact-grid">'+links+'</div></section>';
  }

  function swR(tab, btn) {
    document.querySelectorAll('.rtab').forEach(function(t){t.classList.remove('active');});
    btn.classList.add('active');
    document.getElementById('r-view').classList.toggle('on', tab==='view');
    document.getElementById('r-dl').classList.toggle('on', tab==='dl');
  }

  function scrollSpy(ids) {
    window.addEventListener('scroll', function() {
      var active = ids[0];
      ids.forEach(function(id){
        var el = document.getElementById(id);
        if (el && el.getBoundingClientRect().top < 140) active = id;
      });
      document.querySelectorAll('.nav-a').forEach(function(a){
        a.classList.toggle('active', a.getAttribute('href')==='#'+active);
      });
    }, { passive:true });
  }

  load();
</script>
</body>
</html>
