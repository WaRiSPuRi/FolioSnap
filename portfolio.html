  var nav=[show(d,'about')&&{id:'about',l:'About',i:'◎'},hE&&show(d,'experience')&&{id:'experience',l:'Experience',i:'◈'},hP&&show(d,'projects')&&{id:'projects',l:'Projects',i:'◉'},hEd&&show(d,'education')&&{id:'education',l:'Education',i:'◇'},hSk&&show(d,'skills')&&{id:'skills',l:'Skills',i:'⬡'},hR&&show(d,'resume')&&{id:'resume',l:'Resume',i:'□'},hC&&show(d,'contact')&&{id:'contact',l:'Contact',i:'◌'}].filter(Boolean);
  var soc=[c.email&&'<a href="mailto:'+c.email+'" class="social-a">✉ Email</a>',c.linkedin&&'<a href="'+c.linkedin+'" target="_blank" class="social-a">in LinkedIn</a>',c.github&&'<a href="'+c.github+'" target="_blank" class="social-a">⌥ GitHub</a>',c.twitter&&'<a href="'+c.twitter+'" target="_blank" class="social-a">𝕏 Twitter</a>'].filter(Boolean).join('');
  var html='<div class="layout"><aside class="sidebar"><div><div class="avatar">'+ini(nm)+'</div><div class="sb-name">'+nm+'</div>'+(p.role?'<div class="sb-role">'+p.role+'</div>':'')+(p.status?'<div class="sb-row"><span class="dot"></span><span>'+p.status+'</span></div>':'')+(p.location?'<div class="sb-row"><span style="font-size:11px">📍</span><span>'+p.location+'</span></div>':'')+'<div class="view-count"><span>👁</span><span id="vn">—</span><span>views</span></div></div><nav><div class="nav-label">Navigate</div><div class="nav-links">'+nav.map(function(l){return'<a class="nav-a" href="#'+l.id+'"><span>'+l.i+'</span> '+l.l+'</a>';}).join('')+'</div></nav>'+(soc?'<div><div class="nav-label" style="margin-bottom:8px;">Connect</div><div class="social-row">'+soc+'</div></div>':'')+'</aside><main class="main">'+(show(d,'about')?rAbout(d):'')+(hE&&show(d,'experience')?rExp(d.experience):'')+(hP&&show(d,'projects')?rProj(d.projects):'')+(hEd&&show(d,'education')?rEdu(d):'')+(hSk&&show(d,'skills')?rSk(d):'')+(hR&&show(d,'resume')?rRes(d,p,c):'')+(hC&&show(d,'contact')?rCon(c):'')+'</main></div>';
  document.getElementById('portfolio').innerHTML=html;
  var badge=document.createElement('a');badge.href='/';badge.className='fs-badge';badge.target='_blank';badge.innerHTML='✦ Made with FolioSnap';document.body.appendChild(badge);
  loadViews();
  scrollSpy(nav.map(function(l){return l.id;}));
  startTracking(nav.map(function(l){return l.id;}));
}
function rAbout(d){var s=d.summary||'';return'<section id="about" class="section"><h2 class="sec-h">About</h2>'+(s.split('\n').filter(Boolean).map(function(t){return'<p class="about-p">'+t+'</p>';}).join('')||'<p class="about-p">No summary added yet.</p>')+'</section>';}
function rExp(items){return'<section id="experience" class="section"><h2 class="sec-h">Experience</h2><div class="tl">'+items.map(function(e){return'<div class="tl-item"><div class="tl-logo">'+ini(e.org)+'</div><div class="tl-body"><div class="tl-top"><span class="tl-name">'+(e.org||'')+'</span><span class="tl-date">'+(e.date||'')+'</span></div><div class="tl-role">'+[e.role,e.location].filter(Boolean).join(' · ')+'</div>'+(e.desc?'<div class="tl-desc">'+e.desc+'</div>':'')+'</div></div>';}).join('')+'</div></section>';}
function rProj(items){return'<section id="projects" class="section"><h2 class="sec-h">Projects</h2><div class="proj-list">'+items.map(function(p){var l=(p.demo?'<a href="'+p.demo+'" target="_blank" class="plink">↗ Live Demo</a>':'')+(p.github?'<a href="'+p.github+'" target="_blank" class="plink">↗ GitHub</a>':'');return'<div class="proj-item"><div class="proj-ico">'+ini(p.name)+'</div><div class="proj-body"><div class="proj-top"><span class="proj-name">'+(p.name||'')+'</span><span class="proj-dates">'+(p.date||'')+'</span></div><div class="proj-desc">'+(p.desc||'')+'</div>'+(p.tags?'<div class="proj-tags">'+p.tags.split(',').map(function(t){return'<span class="ptag">'+t.trim()+'</span>';}).join('')+'</div>':'')+(l?'<div class="proj-links">'+l+'</div>':'')+'</div></div>';}).join('')+'</div></section>';}
function rEdu(d){return'<section id="education" class="section"><h2 class="sec-h">Education</h2><div class="tl">'+(d.education||[]).map(function(e){return'<div class="tl-item"><div class="tl-logo">'+ini(e.school)+'</div><div class="tl-body"><div class="tl-top"><span class="tl-name">'+(e.school||'')+'</span><span class="tl-date">'+(e.date||'')+'</span></div>'+(e.degree?'<div class="tl-role">'+e.degree+'</div>':'')+(e.desc?'<div class="tl-desc">'+e.desc+'</div>':'')+'</div></div>';}).join('')+'</div></section>';}
function rSk(d){var sk=(d.skills||[]).map(function(s){return'<span class="sk">'+s+'</span>';}).join('');var ln=(d.languages||[]).map(function(s){return'<span class="sk">'+s+'</span>';}).join('');return'<section id="skills" class="section"><h2 class="sec-h">Skills</h2>'+(sk?'<div class="skills-wrap" style="margin-bottom:1rem;">'+sk+'</div>':'')+(ln?'<div class="nav-label" style="margin-bottom:8px;opacity:.5;">Languages</div><div class="skills-wrap">'+ln+'</div>':'')+'</section>';}
function rRes(d,p,c){var ex=(d.experience||[]).map(function(e){return'<div class="r-entry"><div class="r-etop"><span class="r-ename">'+(e.role?e.role+' — ':'')+e.org+'</span><span class="r-edate">'+(e.date||'')+'</span></div>'+(e.location?'<div class="r-esub">'+e.location+'</div>':'')+(e.desc?'<div class="r-edesc">'+e.desc+'</div>':'')+'</div>';}).join('');var ed=(d.education||[]).map(function(e){return'<div class="r-entry"><div class="r-etop"><span class="r-ename">'+(e.school||'')+'</span><span class="r-edate">'+(e.date||'')+'</span></div>'+(e.degree?'<div class="r-esub">'+e.degree+'</div>':'')+(e.desc?'<div class="r-edesc">'+e.desc+'</div>':'')+'</div>';}).join('');var pr=(d.projects||[]).map(function(p){return'<div class="r-entry"><div class="r-etop"><span class="r-ename">'+(p.name||'')+'</span><span class="r-edate">'+(p.date||'')+'</span></div>'+(p.desc?'<div class="r-edesc">'+p.desc+'</div>':'')+'</div>';}).join('');var sk=(d.skills||[]).map(function(s){return'<span class="sk" style="margin-right:4px;margin-bottom:4px;">'+s+'</span>';}).join('');var ln=(d.languages||[]).map(function(s){return'<span class="sk" style="margin-right:4px;margin-bottom:4px;">'+s+'</span>';}).join('');return'<section id="resume" class="section"><h2 class="sec-h">Resume</h2><div class="rtabs"><button class="rtab active" onclick="swR(\'view\',this)">View online</button><button class="rtab" onclick="swR(\'dl\',this);recDl();">Download PDF</button></div><div id="r-view" class="rpane on"><div class="r-head"><h2>'+(p.name||'')+'</h2><p style="font-size:.85rem;">'+(p.role||'')+(p.location?' · '+p.location:'')+'</p><div class="r-contact">'+(c.email?'<a href="mailto:'+c.email+'">'+c.email+'</a>':'')+(c.phone?'<span>'+c.phone+'</span>':'')+'</div></div>'+(d.summary?'<div class="r-block"><div class="r-btitle">Summary</div><p style="font-size:.85rem;line-height:1.75;">'+d.summary+'</p></div>':'')+(ex?'<div class="r-block"><div class="r-btitle">Experience</div>'+ex+'</div>':'')+(ed?'<div class="r-block"><div class="r-btitle">Education</div>'+ed+'</div>':'')+(pr?'<div class="r-block"><div class="r-btitle">Projects</div>'+pr+'</div>':'')+(sk?'<div class="r-block"><div class="r-btitle">Skills</div><div style="display:flex;flex-wrap:wrap;">'+sk+'</div></div>':'')+(ln?'<div class="r-block"><div class="r-btitle">Languages</div><div style="display:flex;flex-wrap:wrap;">'+ln+'</div></div>':'')+'</div><div id="r-dl" class="rpane"><div class="dl-bar"><span>Resume — '+(p.name||'Portfolio')+'</span><a href="'+d.resumeUrl+'" target="_blank" download class="dl-btn" onclick="recDl()">⬇ Download PDF</a></div></div></section>';}
function rCon(c){var l=[c.email&&'<a href="mailto:'+c.email+'" class="contact-a">✉ '+c.email+'</a>',c.phone&&'<a href="tel:'+c.phone+'" class="contact-a">📞 '+c.phone+'</a>',c.linkedin&&'<a href="'+c.linkedin+'" target="_blank" class="contact-a">in LinkedIn</a>',c.github&&'<a href="'+c.github+'" target="_blank" class="contact-a">⌥ GitHub</a>',c.twitter&&'<a href="'+c.twitter+'" target="_blank" class="contact-a">𝕏 Twitter</a>',c.website&&'<a href="'+c.website+'" target="_blank" class="contact-a">🌐 Website</a>'].filter(Boolean).join('');return'<section id="contact" class="section"><h2 class="sec-h">Contact</h2><p class="contact-note">Feel free to reach out'+(c.email?' — <a href="mailto:'+c.email+'">send an email</a>':'')+' and I\'ll get back to you.</p><div class="contact-grid">'+l+'</div></section>';}
function swR(tab,btn){document.querySelectorAll('.rtab').forEach(function(t){t.classList.remove('active');});btn.classList.add('active');document.getElementById('r-view').classList.toggle('on',tab==='view');document.getElementById('r-dl').classList.toggle('on',tab==='dl');}
function scrollSpy(ids){window.addEventListener('scroll',function(){var a=ids[0];ids.forEach(function(id){var e=document.getElementById(id);if(e&&e.getBoundingClientRect().top<140)a=id;});document.querySelectorAll('.nav-a').forEach(function(a2){a2.classList.toggle('active',a2.getAttribute('href')==='#'+a);});},{passive:true});}
load();
</script>
</body>
