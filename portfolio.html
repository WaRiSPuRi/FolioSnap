<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — FolioSnap</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style id="theme-css">
    /* injected by JS */
  </style>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-size: 14px; line-height: 1.7; }
    .loading { display:flex; align-items:center; justify-content:center; min-height:100vh; font-size:0.9rem; }
    .nf { display:none; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:2rem; }
    .nf h1 { font-size:2rem; font-weight:800; margin-bottom:0.5rem; }
    .nf a { margin-top:1rem; }
    .layout { display:flex; min-height:100vh; max-width:900px; margin:0 auto; padding:0 1.5rem; }
    .sidebar { width:260px; flex-shrink:0; padding:4rem 2rem 4rem 0; position:sticky; top:0; height:100vh; overflow-y:auto; display:flex; flex-direction:column; gap:2rem; }
    .avatar { width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.9rem; margin-bottom:0.5rem; }
    .sb-name { font-weight:800; font-size:1.15rem; letter-spacing:-0.02em; line-height:1.2; margin-bottom:0.25rem; }
    .sb-role { font-size:0.82rem; margin-bottom:0.15rem; }
    .sb-row { display:flex; align-items:center; gap:6px; font-size:0.78rem; margin-top:3px; }
    .dot { width:6px; height:6px; border-radius:50%; background:#22c55e; flex-shrink:0; animation:blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
    .nav-label { font-size:0.68rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:6px; opacity:0.5; }
    .nav-links { display:flex; flex-direction:column; gap:2px; }
    .nav-a { display:flex; align-items:center; gap:8px; padding:5px 8px; border-radius:6px; font-size:0.85rem; text-decoration:none; transition:all 0.15s; }
    .social-row { display:flex; gap:8px; flex-wrap:wrap; }
    .social-a { display:flex; align-items:center; gap:5px; font-size:0.78rem; text-decoration:none; padding:4px 10px; border-radius:6px; transition:all 0.15s; }
    .main { flex:1; padding:4rem 0 6rem 2.5rem; min-width:0; }
    .section { margin-bottom:4rem; }
    .sec-h { font-size:1.3rem; font-weight:800; letter-spacing:-0.02em; margin-bottom:1.25rem; padding-bottom:0.75rem; }
    .about-p { line-height:1.85; font-size:0.92rem; margin-bottom:0.75rem; }
    .tl { display:flex; flex-direction:column; }
    .tl-item { display:flex; gap:1rem; padding:1rem; border-radius:12px; transition:background 0.15s; }
    .tl-logo { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.7rem; flex-shrink:0; margin-top:2px; }
    .tl-body { flex:1; min-width:0; }
    .tl-top { display:flex; align-items:baseline; justify-content:space-between; gap:1rem; flex-wrap:wrap; }
    .tl-name { font-weight:500; font-size:0.9rem; }
    .tl-date { font-size:0.78rem; white-space:nowrap; }
    .tl-role { font-size:0.82rem; margin-top:1px; }
    .tl-desc { font-size:0.82rem; margin-top:5px; line-height:1.65; white-space:pre-line; }
    .proj-list { display:flex; flex-direction:column; }
    .proj-item { display:flex; align-items:flex-start; gap:1rem; padding:1rem; border-radius:12px; transition:background 0.15s; }
    .proj-ico { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.7rem; flex-shrink:0; margin-top:2px; }
    .proj-body { flex:1; min-width:0; }
    .proj-top { display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:0.5rem; }
    .proj-name { font-weight:500; font-size:0.9rem; }
    .proj-dates { font-size:0.78rem; }
    .proj-desc { font-size:0.82rem; margin-top:3px; line-height:1.6; }
    .proj-tags { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
    .ptag { padding:2px 8px; border-radius:4px; font-size:0.72rem; font-weight:500; }
    .proj-links { display:flex; gap:8px; margin-top:8px; }
    .plink { font-size:0.78rem; text-decoration:none; }
    .plink:hover { text-decoration:underline; }
    .skills-wrap { display:flex; flex-wrap:wrap; gap:6px; }
    .sk { padding:4px 10px; border-radius:100px; font-size:0.78rem; }
    .rtabs { display:flex; gap:4px; margin-bottom:1.5rem; }
    .rtab { padding:6px 14px; border-radius:6px; font-size:0.82rem; font-weight:500; cursor:pointer; border:1px solid transparent; background:transparent; transition:all 0.15s; font-family:inherit; }
    .rpane { display:none; }
    .rpane.on { display:block; }
    .r-head { margin-bottom:1.5rem; }
    .r-head h2 { font-size:1.3rem; font-weight:800; letter-spacing:-0.02em; margin-bottom:4px; }
    .r-contact { display:flex; flex-wrap:wrap; gap:12px; font-size:0.8rem; margin-top:6px; }
    .r-contact a { text-decoration:none; }
    .r-block { margin-bottom:1.75rem; }
    .r-btitle { font-size:0.7rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:0.6rem; padding-bottom:0.35rem; opacity:0.5; }
    .r-entry { margin-bottom:1.1rem; }
    .r-etop { display:flex; justify-content:space-between; flex-wrap:wrap; gap:0.5rem; }
    .r-ename { font-weight:500; font-size:0.88rem; }
    .r-edate { font-size:0.78rem; }
    .r-esub { font-size:0.82rem; margin-top:2px; }
    .r-edesc { font-size:0.82rem; margin-top:4px; line-height:1.65; white-space:pre-line; }
    .dl-bar { display:flex; align-items:center; justify-content:space-between; padding:0.75rem 1rem; border-radius:6px; font-size:0.82rem; }
    .dl-btn { padding:5px 14px; border:none; border-radius:6px; font-size:0.78rem; font-weight:500; cursor:pointer; text-decoration:none; }
    .contact-note { font-size:0.88rem; margin-bottom:1.25rem; line-height:1.7; }
    .contact-grid { display:flex; gap:8px; flex-wrap:wrap; }
    .contact-a { display:flex; align-items:center; gap:6px; padding:7px 14px; border-radius:6px; font-size:0.82rem; text-decoration:none; transition:all 0.15s; }
    @media (max-width:680px) {
      .layout { flex-direction:column; padding:0 1rem; }
      .sidebar { width:100%; height:auto; position:static; padding:2.5rem 0 1.5rem; }
      .main { padding:2rem 0 4rem; }
    }
  </style>
</head>
<body>
<div id="loading" class="loading">Loading portfolio…</div>
<div id="nf" class="nf"><h1>404</h1><p>This portfolio doesn't exist.</p><a href="/">← Go home</a></div>
<div id="portfolio"></div>

<script>
  var _sb = window.supabase.createClient(
    'https://aoagptbyrvigckrxexru.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvYWdwdGJ5cnZpZ2NrcnhleHJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2OTMzODMsImV4cCI6MjA5MTI2OTM4M30.oz3dkZj3mFea5Euit8dXwpwiOcWC_59GodzvueMiKbM'
  );

  /* ── TEMPLATES ── */
  var TEMPLATES = {
    minimal: {
      bg:'#ffffff', sidebar:'#f8f8f7', text:'#1a1917', muted:'#6b6a66', subtle:'#9b9a96',
      accent:'#2563eb', border:'#e5e4e0', hfont:'Syne', bfont:'Inter',
      avatarBg:'#1a1917', avatarText:'#ffffff', tagBg:'#f0efed', tagText:'#6b6a66',
      tlLogoBg:'#f0efed', tlLogoBorder:'#e5e4e0', socialBg:'transparent', socialBorder:'#e5e4e0',
      navHover:'#f0efed', dlBarBg:'#f8f8f7', dlBarBorder:'#e5e4e0', dlBtnBg:'#1a1917', dlBtnText:'#fff'
    },
    dark: {
      bg:'#0a0a0a', sidebar:'#111111', text:'#f0ede8', muted:'#888580', subtle:'#555250',
      accent:'#e8d5a0', border:'rgba(255,255,255,0.08)', hfont:'Syne', bfont:'Inter',
      avatarBg:'#e8d5a0', avatarText:'#0a0a0a', tagBg:'#1a1a1a', tagText:'#888580',
      tlLogoBg:'#1a1a1a', tlLogoBorder:'rgba(255,255,255,0.08)', socialBg:'transparent', socialBorder:'rgba(255,255,255,0.15)',
      navHover:'#1a1a1a', dlBarBg:'#111', dlBarBorder:'rgba(255,255,255,0.1)', dlBtnBg:'#e8d5a0', dlBtnText:'#0a0a0a'
    },
    bold: {
      bg:'#f5f0e8', sidebar:'#ede8de', text:'#1a0a00', muted:'#7a5a40', subtle:'#b89070',
      accent:'#dc2626', border:'#ddd5c5', hfont:"'Georgia', serif", bfont:'Inter',
      avatarBg:'#dc2626', avatarText:'#fff', tagBg:'#e8e0d0', tagText:'#7a5a40',
      tlLogoBg:'#e8e0d0', tlLogoBorder:'#ddd5c5', socialBg:'transparent', socialBorder:'#ddd5c5',
      navHover:'#e8e0d0', dlBarBg:'#ede8de', dlBarBorder:'#ddd5c5', dlBtnBg:'#1a0a00', dlBtnText:'#f5f0e8'
    },
    pastel: {
      bg:'#faf5ff', sidebar:'#f3e8ff', text:'#3b0764', muted:'#7c3aed', subtle:'#a78bfa',
      accent:'#7c3aed', border:'#e9d5ff', hfont:'Syne', bfont:'Inter',
      avatarBg:'#7c3aed', avatarText:'#fff', tagBg:'#ede9fe', tagText:'#7c3aed',
      tlLogoBg:'#ede9fe', tlLogoBorder:'#e9d5ff', socialBg:'transparent', socialBorder:'#e9d5ff',
      navHover:'#ede9fe', dlBarBg:'#f3e8ff', dlBarBorder:'#e9d5ff', dlBtnBg:'#7c3aed', dlBtnText:'#fff'
    },
    mono: {
      bg:'#1a1a1a', sidebar:'#111', text:'#4ade80', muted:'#22c55e', subtle:'#166534',
      accent:'#4ade80', border:'#2a2a2a', hfont:"'Courier New', monospace", bfont:"'Courier New', monospace",
      avatarBg:'#4ade80', avatarText:'#1a1a1a', tagBg:'#222', tagText:'#4ade80',
      tlLogoBg:'#222', tlLogoBorder:'#2a2a2a', socialBg:'transparent', socialBorder:'#2a2a2a',
      navHover:'#222', dlBarBg:'#111', dlBarBorder:'#2a2a2a', dlBtnBg:'#4ade80', dlBtnText:'#1a1a1a'
    }
  };

  function getTheme(d) {
    var t = d.template||'minimal';
    if(t==='custom') {
      var c=d.custom||{};
      return {
        bg:c.bg||'#fff', sidebar:c.sidebar||'#f8f8f7', text:c.text||'#1a1917',
        muted:c.muted||c.text||'#6b6a66', subtle:c.subtle||'#9b9a96',
        accent:c.accent||'#2563eb', border:'#e5e4e0',
        hfont:c.hfont||'Syne', bfont:c.bfont||'Inter',
        avatarBg:c.accent||'#2563eb', avatarText:'#fff',
        tagBg:'#f0efed', tagText:'#6b6a66',
        tlLogoBg:'#f0efed', tlLogoBorder:'#e5e4e0',
        socialBg:'transparent', socialBorder:'#e5e4e0',
        navHover:'#f0efed', dlBarBg:'#f8f8f7', dlBarBorder:'#e5e4e0',
        dlBtnBg:c.text||'#1a1917', dlBtnText:c.bg||'#fff'
      };
    }
    return TEMPLATES[t]||TEMPLATES.minimal;
  }

  function applyTheme(th) {
    var css = [
      'body{background:'+th.bg+';color:'+th.text+';font-family:'+th.bfont+',sans-serif;}',
      '.sidebar{background:'+th.sidebar+';border-right:1px solid '+th.border+';}',
      '.main{border-left:1px solid '+th.border+';}',
      '.sec-h{border-bottom:1px solid '+th.border+';color:'+th.text+';font-family:'+th.hfont+',serif;}',
      '.sb-name{color:'+th.text+';font-family:'+th.hfont+',serif;}',
      '.sb-role,.sb-row,.tl-role,.tl-date,.tl-desc,.proj-desc,.proj-dates,.about-p,.r-esub,.r-edesc,.r-edate,.contact-note{color:'+th.muted+';}',
      '.tl-name,.proj-name,.r-ename{color:'+th.text+';}',
      '.r-btitle{color:'+th.subtle+';}',
      '.nav-label{color:'+th.subtle+';}',
      '.nav-a{color:'+th.muted+';}',
      '.nav-a:hover,.nav-a.active{background:'+th.navHover+';color:'+th.text+';}',
      '.avatar{background:'+th.avatarBg+';color:'+th.avatarText+';}',
      '.tl-logo,.proj-ico{background:'+th.tlLogoBg+';border:1px solid '+th.tlLogoBorder+';color:'+th.muted+';}',
      '.tl-item:hover,.proj-item:hover{background:'+th.navHover+';}',
      '.social-a{border:1px solid '+th.socialBorder+';color:'+th.muted+';}',
      '.social-a:hover{border-color:'+th.text+';color:'+th.text+';}',
      '.contact-a{border:1px solid '+th.border+';color:'+th.text+';}',
      '.contact-a:hover{background:'+th.navHover+';}',
      '.ptag{background:'+th.tagBg+';color:'+th.tagText+';}',
      '.sk{background:'+th.tagBg+';border:1px solid '+th.border+';color:'+th.text+';}',
      '.plink{color:'+th.accent+';}',
      '.r-contact a,.contact-note a{color:'+th.accent+';}',
      '.dl-bar{background:'+th.dlBarBg+';border:1px solid '+th.dlBarBorder+';}',
      '.dl-btn{background:'+th.dlBtnBg+';color:'+th.dlBtnText+';}',
      '.rtab.active{background:'+th.text+';color:'+th.bg+';}',
      '.rtab:not(.active){color:'+th.muted+';}',
      '.r-block{border-color:'+th.border+';}',
      '.r-btitle{border-bottom:1px solid '+th.border+';}',
    ].join('\n');
    document.getElementById('theme-css').textContent=css;
  }

  function ini(n){ return (n||'?').split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2); }

  async function loadPortfolio(){
    var parts=window.location.pathname.split('/portfolio/');
    var slug=parts[1]?parts[1].replace(/\/$/,''):null;
    if(!slug){
      var sess=await _sb.auth.getSession();
      if(sess.data&&sess.data.session){
        var r2=await _sb.from('portfolios').select('content').eq('user_id',sess.data.session.user.id).maybeSingle();
        if(r2.data){render(r2.data.content);return;}
      }
      show404(); return;
    }
    var r=await _sb.from('portfolios').select('content').eq('slug',slug).maybeSingle();
    if(!r.data){show404();return;}
    render(r.data.content);
  }

  function show404(){
    document.getElementById('loading').style.display='none';
    document.getElementById('nf').style.display='flex';
  }

  function shouldShow(d, key) {
    if(d.template!=='custom') return true;
    var sec=(d.custom&&d.custom.sections)||{};
    var map={about:'about',experience:'exp',projects:'proj',education:'edu',skills:'skills',resume:'resume',contact:'contact'};
    return sec[map[key]]!==false;
  }

  function render(d){
    document.getElementById('loading').style.display='none';
    var th=getTheme(d);
    applyTheme(th);
    var p=d.profile||{},c=d.contact||{};
    var name=p.name||'Portfolio';
    document.title=name+' — FolioSnap';

    var hasExp=(d.experience||[]).length>0;
    var hasProj=(d.projects||[]).length>0;
    var hasEdu=(d.education||[]).length>0;
    var hasSk=(d.skills||[]).length>0||(d.languages||[]).length>0;
    var hasRes=!!d.resumeUrl;
    var hasCon=!!(c.email||c.linkedin||c.github||c.twitter||c.phone);

    var navItems=[
      shouldShow(d,'about')&&{id:'about',label:'About',icon:'◎'},
      hasExp&&shouldShow(d,'experience')&&{id:'experience',label:'Experience',icon:'◈'},
      hasProj&&shouldShow(d,'projects')&&{id:'projects',label:'Projects',icon:'◉'},
      hasEdu&&shouldShow(d,'education')&&{id:'education',label:'Education',icon:'◇'},
      hasSk&&shouldShow(d,'skills')&&{id:'skills',label:'Skills',icon:'⬡'},
      hasRes&&shouldShow(d,'resume')&&{id:'resume',label:'Resume',icon:'□'},
      hasCon&&shouldShow(d,'contact')&&{id:'contact',label:'Contact',icon:'◌'},
    ].filter(Boolean);

    var socials=[
      c.email&&'<a href="mailto:'+c.email+'" class="social-a">✉ Email</a>',
      c.linkedin&&'<a href="'+c.linkedin+'" target="_blank" class="social-a">in LinkedIn</a>',
      c.github&&'<a href="'+c.github+'" target="_blank" class="social-a">⌥ GitHub</a>',
      c.twitter&&'<a href="'+c.twitter+'" target="_blank" class="social-a">𝕏 Twitter</a>',
    ].filter(Boolean).join('');

    var html='<div class="layout">'
      +'<aside class="sidebar">'
      +'<div><div class="avatar">'+ini(name)+'</div>'
      +'<div class="sb-name">'+name+'</div>'
      +(p.role?'<div class="sb-role">'+p.role+'</div>':'')
      +(p.status?'<div class="sb-row"><span class="dot"></span><span>'+p.status+'</span></div>':'')
      +(p.location?'<div class="sb-row"><span style="font-size:11px">📍</span><span>'+p.location+'</span></div>':'')
      +'</div>'
      +'<nav><div class="nav-label">Navigate</div><div class="nav-links">'
      +navItems.map(function(l){return'<a class="nav-a" href="#'+l.id+'"><span>'+l.icon+'</span> '+l.label+'</a>';}).join('')
      +'</div></nav>'
      +(socials?'<div><div class="nav-label" style="margin-bottom:8px;">Connect</div><div class="social-row">'+socials+'</div></div>':'')
      +'</aside>'
      +'<main class="main">'
      +(shouldShow(d,'about')?renderAbout(d):'')
      +(hasExp&&shouldShow(d,'experience')?renderExp(d.experience):'')
      +(hasProj&&shouldShow(d,'projects')?renderProj(d.projects):'')
      +(hasEdu&&shouldShow(d,'education')?renderEdu(d):'')
      +(hasSk&&shouldShow(d,'skills')?renderSkills(d):'')
      +(hasRes&&shouldShow(d,'resume')?renderResume(d,p,c):'')
      +(hasCon&&shouldShow(d,'contact')?renderContact(c):'')
      +'</main></div>';

    document.getElementById('portfolio').innerHTML=html;
    scrollSpy(navItems.map(function(l){return l.id;}));
  }

  function renderAbout(d){
    var s=d.summary||'';
    var paras=s.split('\n').filter(Boolean).map(function(t){return'<p class="about-p">'+t+'</p>';}).join('');
    return'<section id="about" class="section"><h2 class="sec-h">About</h2>'+(paras||'<p class="about-p">No summary yet.</p>')+'</section>';
  }

  function renderExp(items){
    return'<section id="experience" class="section"><h2 class="sec-h">Experience</h2><div class="tl">'
      +items.map(function(e){
        return'<div class="tl-item"><div class="tl-logo">'+ini(e.org)+'</div><div class="tl-body">'
          +'<div class="tl-top"><span class="tl-name">'+(e.org||'')+'</span><span class="tl-date">'+(e.date||'')+'</span></div>'
          +'<div class="tl-role">'+[e.role,e.location].filter(Boolean).join(' · ')+'</div>'
          +(e.desc?'<div class="tl-desc">'+e.desc+'</div>':'')
          +'</div></div>';
      }).join('')+'</div></section>';
  }

  function renderProj(items){
    return'<section id="projects" class="section"><h2 class="sec-h">Projects</h2><div class="proj-list">'
      +items.map(function(p){
        var links=(p.demo?'<a href="'+p.demo+'" target="_blank" class="plink">↗ Live Demo</a>':'')
                 +(p.github?'<a href="'+p.github+'" target="_blank" class="plink">↗ GitHub</a>':'');
        return'<div class="proj-item"><div class="proj-ico">'+ini(p.name)+'</div><div class="proj-body">'
          +'<div class="proj-top"><span class="proj-name">'+(p.name||'')+'</span><span class="proj-dates">'+(p.date||'')+'</span></div>'
          +'<div class="proj-desc">'+(p.desc||'')+'</div>'
          +(p.tags?'<div class="proj-tags">'+p.tags.split(',').map(function(t){return'<span class="ptag">'+t.trim()+'</span>';}).join('')+'</div>':'')
          +(links?'<div class="proj-links">'+links+'</div>':'')
          +'</div></div>';
      }).join('')+'</div></section>';
  }

  function renderEdu(d){
    return'<section id="education" class="section"><h2 class="sec-h">Education</h2><div class="tl">'
      +(d.education||[]).map(function(e){
        return'<div class="tl-item"><div class="tl-logo">'+ini(e.school)+'</div><div class="tl-body">'
          +'<div class="tl-top"><span class="tl-name">'+(e.school||'')+'</span><span class="tl-date">'+(e.date||'')+'</span></div>'
          +(e.degree?'<div class="tl-role">'+e.degree+'</div>':'')
          +(e.desc?'<div class="tl-desc">'+e.desc+'</div>':'')
          +'</div></div>';
      }).join('')+'</div></section>';
  }

  function renderSkills(d){
    var sk=(d.skills||[]).map(function(s){return'<span class="sk">'+s+'</span>';}).join('');
    var ln=(d.languages||[]).map(function(s){return'<span class="sk">'+s+'</span>';}).join('');
    return'<section id="skills" class="section"><h2 class="sec-h">Skills</h2>'
      +(sk?'<div class="skills-wrap" style="margin-bottom:1rem;">'+sk+'</div>':'')
      +(ln?'<div class="nav-label" style="margin-bottom:8px;opacity:0.5;">Languages</div><div class="skills-wrap">'+ln+'</div>':'')
      +'</section>';
  }

  function renderResume(d,p,c){
    var exp=(d.experience||[]).map(function(e){
      return'<div class="r-entry"><div class="r-etop"><span class="r-ename">'+(e.role?e.role+' — ':'')+e.org+'</span><span class="r-edate">'+(e.date||'')+'</span></div>'
        +(e.location?'<div class="r-esub">'+e.location+'</div>':'')+(e.desc?'<div class="r-edesc">'+e.desc+'</div>':'')+'</div>';
    }).join('');
    var edu=(d.education||[]).map(function(e){
      return'<div class="r-entry"><div class="r-etop"><span class="r-ename">'+(e.school||'')+'</span><span class="r-edate">'+(e.date||'')+'</span></div>'
        +(e.degree?'<div class="r-esub">'+e.degree+'</div>':'')+(e.desc?'<div class="r-edesc">'+e.desc+'</div>':'')+'</div>';
    }).join('');
    var proj=(d.projects||[]).map(function(p){
      return'<div class="r-entry"><div class="r-etop"><span class="r-ename">'+(p.name||'')+'</span><span class="r-edate">'+(p.date||'')+'</span></div>'
        +(p.desc?'<div class="r-edesc">'+p.desc+'</div>':'')+'</div>';
    }).join('');
    var sk=(d.skills||[]).map(function(s){return'<span class="sk">'+s+'</span>';}).join('');
    var ln=(d.languages||[]).map(function(s){return'<span class="sk">'+s+'</span>';}).join('');
    return'<section id="resume" class="section"><h2 class="sec-h">Resume</h2>'
      +'<div class="rtabs"><button class="rtab active" onclick="swR(\'view\',this)">View online</button><button class="rtab" onclick="swR(\'dl\',this)">Download PDF</button></div>'
      +'<div id="r-view" class="rpane on">'
      +'<div class="r-head"><h2>'+(p.name||'')+'</h2>'
      +'<p style="font-size:0.85rem;">'+(p.role||'')+(p.location?' · '+p.location:'')+'</p>'
      +'<div class="r-contact">'+(c.email?'<a href="mailto:'+c.email+'">'+c.email+'</a>':'')+(c.phone?'<span>'+c.phone+'</span>':'')+'</div></div>'
      +(d.summary?'<div class="r-block"><div class="r-btitle">Summary</div><p style="font-size:0.85rem;line-height:1.75;">'+d.summary+'</p></div>':'')
      +(exp?'<div class="r-block"><div class="r-btitle">Experience</div>'+exp+'</div>':'')
      +(edu?'<div class="r-block"><div class="r-btitle">Education</div>'+edu+'</div>':'')
      +(proj?'<div class="r-block"><div class="r-btitle">Projects</div>'+proj+'</div>':'')
      +(sk?'<div class="r-block"><div class="r-btitle">Skills</div><div class="skills-wrap">'+sk+'</div></div>':'')
      +(ln?'<div class="r-block"><div class="r-btitle">Languages</div><div class="skills-wrap">'+ln+'</div></div>':'')
      +'</div>'
      +'<div id="r-dl" class="rpane"><div class="dl-bar"><span>Resume — '+(p.name||'Portfolio')+'</span><a href="'+d.resumeUrl+'" target="_blank" download class="dl-btn">⬇ Download PDF</a></div></div>'
      +'</section>';
  }

  function renderContact(c){
    var links=[
      c.email&&'<a href="mailto:'+c.email+'" class="contact-a">✉ '+c.email+'</a>',
      c.phone&&'<a href="tel:'+c.phone+'" class="contact-a">📞 '+c.phone+'</a>',
      c.linkedin&&'<a href="'+c.linkedin+'" target="_blank" class="contact-a">in LinkedIn</a>',
      c.github&&'<a href="'+c.github+'" target="_blank" class="contact-a">⌥ GitHub</a>',
      c.twitter&&'<a href="'+c.twitter+'" target="_blank" class="contact-a">𝕏 Twitter</a>',
      c.website&&'<a href="'+c.website+'" target="_blank" class="contact-a">🌐 Website</a>',
    ].filter(Boolean).join('');
    return'<section id="contact" class="section"><h2 class="sec-h">Contact</h2>'
      +'<p class="contact-note">Feel free to reach out'+(c.email?' — <a href="mailto:'+c.email+'">send an email</a>':'')+' and I\'ll get back to you.</p>'
      +'<div class="contact-grid">'+links+'</div></section>';
  }

  function swR(tab,btn){
    document.querySelectorAll('.rtab').forEach(function(t){t.classList.remove('active');});
    btn.classList.add('active');
    document.getElementById('r-view').classList.toggle('on',tab==='view');
    document.getElementById('r-dl').classList.toggle('on',tab==='dl');
  }

  function scrollSpy(ids){
    window.addEventListener('scroll',function(){
      var active=ids[0];
      ids.forEach(function(id){var el=document.getElementById(id);if(el&&el.getBoundingClientRect().top<140)active=id;});
      document.querySelectorAll('.nav-a').forEach(function(a){a.classList.toggle('active',a.getAttribute('href')==='#'+active);});
    },{passive:true});
  }

  loadPortfolio();
</script>
</body>
</html>
