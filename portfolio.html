<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fff; --surface: #f8f8f7; --surface2: #f0efed;
      --border: #e5e4e0; --text: #1a1917; --muted: #6b6a66;
      --subtle: #9b9a96; --link: #2563eb; --r: 12px; --rs: 6px; --sidebar: 260px;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.7; }

    .not-found { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 2rem; }
    .not-found h1 { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; }
    .not-found p { color: var(--muted); }

    .layout { display: flex; min-height: 100vh; max-width: 900px; margin: 0 auto; padding: 0 1.5rem; }

    .sidebar { width: var(--sidebar); flex-shrink: 0; padding: 4rem 2rem 4rem 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; gap: 2rem; }
    .avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--text); display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; color: var(--bg); margin-bottom: 0.5rem; }
    .sidebar-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.15rem; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 0.25rem; }
    .sidebar-role { font-size: 0.82rem; color: var(--muted); margin-bottom: 0.15rem; }
    .status-row { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--muted); }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; flex-shrink: 0; animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

    .nav-section { display: flex; flex-direction: column; gap: 2px; }
    .nav-label { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--subtle); margin-bottom: 6px; }
    .nav-item { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: var(--rs); font-size: 0.85rem; color: var(--muted); text-decoration: none; transition: all 0.15s; }
    .nav-item:hover, .nav-item.active { background: var(--surface2); color: var(--text); }
    .nav-icon { width: 16px; text-align: center; font-size: 13px; }

    .sidebar-social { display: flex; gap: 8px; flex-wrap: wrap; }
    .social-btn { display: flex; align-items: center; gap: 5px; font-size: 0.78rem; color: var(--muted); text-decoration: none; padding: 4px 10px; border: 1px solid var(--border); border-radius: var(--rs); transition: all 0.15s; }
    .social-btn:hover { border-color: var(--text); color: var(--text); }

    .main { flex: 1; padding: 4rem 0 6rem 2.5rem; border-left: 1px solid var(--border); min-width: 0; }
    .section { margin-bottom: 4rem; }
    .section-heading { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }

    .about-text { color: var(--muted); line-height: 1.85; font-size: 0.92rem; }
    .about-text p { margin-bottom: 0.75rem; }

    .timeline { display: flex; flex-direction: column; }
    .timeline-item { display: flex; gap: 1rem; padding: 1rem; border-radius: var(--r); transition: background 0.15s; }
    .timeline-item:hover { background: var(--surface); }
    .tl-logo { width: 36px; height: 36px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.7rem; color: var(--text); flex-shrink: 0; margin-top: 2px; }
    .tl-body { flex: 1; min-width: 0; }
    .tl-top { display: flex; align-items: baseline; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    .tl-name { font-weight: 500; font-size: 0.9rem; }
    .tl-date { font-size: 0.78rem; color: var(--subtle); white-space: nowrap; }
    .tl-role { font-size: 0.82rem; color: var(--muted); margin-top: 1px; }
    .tl-desc { font-size: 0.82rem; color: var(--muted); margin-top: 5px; line-height: 1.65; white-space: pre-line; }

    .projects-list { display: flex; flex-direction: column; }
    .project-item { display: flex; align-items: flex-start; gap: 1rem; padding: 1rem; border-radius: var(--r); transition: background 0.15s; }
    .project-item:hover { background: var(--surface); }
    .project-icon { width: 36px; height: 36px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; margin-top: 2px; font-weight: 700; color: var(--muted); font-size: 0.75rem; }
    .project-body { flex: 1; min-width: 0; }
    .project-top { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
    .project-name { font-weight: 500; font-size: 0.9rem; }
    .project-dates { font-size: 0.78rem; color: var(--subtle); }
    .project-desc { font-size: 0.82rem; color: var(--muted); margin-top: 3px; line-height: 1.6; }
    .project-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .tag { padding: 2px 8px; background: var(--surface2); border-radius: 4px; font-size: 0.72rem; color: var(--muted); font-weight: 500; }
    .project-link-row { display: flex; gap: 8px; margin-top: 8px; }
    .plink { font-size: 0.78rem; color: var(--link); text-decoration: none; }
    .plink:hover { text-decoration: underline; }

    .resume-tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; }
    .rtab { padding: 6px 14px; border-radius: var(--rs); font-size: 0.82rem; font-weight: 500; cursor: pointer; border: 1px solid transparent; background: transparent; color: var(--muted); transition: all 0.15s; }
    .rtab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
    .rtab:not(.active):hover { background: var(--surface2); color: var(--text); }
    .resume-pane { display: none; }
    .resume-pane.visible { display: block; }

    .resume-header { margin-bottom: 1.5rem; }
    .resume-header h2 { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 4px; }
    .resume-contact-row { display: flex; flex-wrap: wrap; gap: 12px; font-size: 0.8rem; color: var(--muted); }
    .resume-contact-row a { color: var(--link); text-decoration: none; }
    .resume-block { margin-bottom: 1.75rem; }
    .resume-block-title { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--subtle); margin-bottom: 0.6rem; padding-bottom: 0.35rem; border-bottom: 1px solid var(--border); }
    .r-entry { margin-bottom: 1.1rem; }
    .r-entry-top { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
    .r-entry-name { font-weight: 500; font-size: 0.88rem; }
    .r-entry-date { font-size: 0.78rem; color: var(--subtle); }
    .r-entry-sub { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }
    .r-entry-desc { font-size: 0.82rem; color: var(--muted); margin-top: 4px; line-height: 1.65; white-space: pre-line; }
    .skills-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .skill-tag { padding: 4px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 100px; font-size: 0.78rem; color: var(--text); }

    .download-bar { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--rs); font-size: 0.82rem; color: var(--muted); }
    .download-btn { padding: 5px 14px; background: var(--text); color: var(--bg); border: none; border-radius: var(--rs); font-size: 0.78rem; font-weight: 500; cursor: pointer; text-decoration: none; }
    .download-btn:hover { opacity: 0.8; }

    .contact-note { font-size: 0.88rem; color: var(--muted); margin-bottom: 1.25rem; line-height: 1.7; }
    .contact-note a { color: var(--link); }
    .contact-grid { display: flex; gap: 8px; flex-wrap: wrap; }
    .contact-link { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border: 1px solid var(--border); border-radius: var(--rs); font-size: 0.82rem; color: var(--text); text-decoration: none; transition: all 0.15s; }
    .contact-link:hover { border-color: var(--text); background: var(--surface); }

    .cert-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 1rem; }
    .cert-badge { display: flex; align-items: center; gap: 6px; padding: 5px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 100px; font-size: 0.78rem; font-weight: 500; color: var(--text); }

    .loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; font-size: 0.9rem; color: var(--muted); }

    @media (max-width: 680px) {
      .layout { flex-direction: column; padding: 0 1rem; }
      .sidebar { width: 100%; height: auto; position: static; padding: 2.5rem 0 1.5rem; border-bottom: 1px solid var(--border); }
      .main { padding: 2rem 0 4rem; border-left: none; }
    }
  </style>
</head>
<body>

<div id="loading" class="loading">Loading portfolio…</div>
<div id="not-found" class="not-found" style="display:none;">
  <h1>404</h1>
  <p>This portfolio doesn't exist.</p>
  <a href="/" style="margin-top:1rem;color:var(--link);">← Go home</a>
</div>
<div id="portfolio" style="display:none;"></div>

<script>
  const SUPABASE_URL = 'https://aoagptbyrvigckrxexru.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_WrkoZET6622UgoyhqxNtjg_f3FWv7xc';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function loadPortfolio() {
    const slug = window.location.pathname.split('/portfolio/')[1]?.replace(/\/$/, '');
    if (!slug) { showNotFound(); return; }

    const { data, error } = await supabase.from('portfolios').select('content').eq('slug', slug).single();
    if (error || !data) { showNotFound(); return; }

    document.getElementById('loading').style.display = 'none';
    renderPortfolio(data.content);
  }

  function showNotFound() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('not-found').style.display = 'flex';
  }

  function initials(name) {
    return (name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function abbrev(name) {
    return (name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function renderPortfolio(d) {
    const p = d.profile || {};
    const c = d.contact || {};
    const name = p.name || 'Portfolio';
    document.title = name + ' — Portfolio';

    const hasSections = {
      experience: (d.experience || []).length > 0,
      projects: (d.projects || []).length > 0,
      education: (d.education || []).length > 0,
      skills: (d.skills || []).length > 0 || (d.languages || []).length > 0,
      resume: !!d.resumeUrl,
      contact: !!(c.email || c.linkedin || c.github || c.twitter),
    };

    const navLinks = [
      { id: 'about', label: 'About', icon: '◎', always: true },
      { id: 'experience', label: 'Experience', icon: '◈', show: hasSections.experience },
      { id: 'projects', label: 'Projects', icon: '◉', show: hasSections.projects },
      { id: 'education', label: 'Education', icon: '◇', show: hasSections.education },
      { id: 'skills', label: 'Skills', icon: '⬡', show: hasSections.skills },
      { id: 'resume', label: 'Resume', icon: '□', show: hasSections.resume },
      { id: 'contact', label: 'Contact', icon: '◌', show: hasSections.contact },
    ].filter(l => l.always || l.show);

    const socialLinks = [
      c.email && `<a href="mailto:${c.email}" class="social-btn">✉ Email</a>`,
      c.linkedin && `<a href="${c.linkedin}" target="_blank" class="social-btn">in LinkedIn</a>`,
      c.github && `<a href="${c.github}" target="_blank" class="social-btn">⌥ GitHub</a>`,
      c.twitter && `<a href="${c.twitter}" target="_blank" class="social-btn">𝕏 Twitter</a>`,
    ].filter(Boolean).join('');

    const html = `
    <div class="layout">
      <aside class="sidebar">
        <div>
          <div class="avatar">${initials(name)}</div>
          <div class="sidebar-name">${name}</div>
          <div class="sidebar-role">${p.role || ''}</div>
          ${p.status ? `<div class="status-row"><span class="dot"></span><span>${p.status}</span></div>` : ''}
          ${p.location ? `<div class="status-row" style="margin-top:4px;"><span style="font-size:11px;">📍</span><span>${p.location}</span></div>` : ''}
        </div>
        <nav class="nav-section">
          <div class="nav-label">Navigate</div>
          ${navLinks.map(l => `<a class="nav-item" href="#${l.id}"><span class="nav-icon">${l.icon}</span> ${l.label}</a>`).join('')}
        </nav>
        ${socialLinks ? `<div><div class="nav-label" style="margin-bottom:8px;">Connect</div><div class="sidebar-social">${socialLinks}</div></div>` : ''}
      </aside>

      <main class="main">

        ${renderAbout(d)}
        ${hasSections.experience ? renderExperience(d.experience) : ''}
        ${hasSections.projects ? renderProjects(d.projects) : ''}
        ${hasSections.education ? renderEducation(d) : ''}
        ${hasSections.resume ? renderResume(d, p, c) : ''}
        ${hasSections.contact ? renderContact(c) : ''}

      </main>
    </div>`;

    document.getElementById('portfolio').innerHTML = html;
    document.getElementById('portfolio').style.display = 'block';
    setupScrollSpy(navLinks.map(l => l.id));
  }

  function renderAbout(d) {
    const summary = d.summary || '';
    return `
    <section id="about" class="section">
      <h2 class="section-heading">About</h2>
      <div class="about-text">
        ${summary ? summary.split('\n').filter(Boolean).map(p => `<p>${p}</p>`).join('') : '<p style="color:var(--subtle)">No summary added yet.</p>'}
      </div>
    </section>`;
  }

  function renderExperience(items) {
    return `
    <section id="experience" class="section">
      <h2 class="section-heading">Experience</h2>
      <div class="timeline">
        ${items.map(e => `
          <div class="timeline-item">
            <div class="tl-logo">${abbrev(e.org)}</div>
            <div class="tl-body">
              <div class="tl-top"><span class="tl-name">${e.org || ''}</span><span class="tl-date">${e.date || ''}</span></div>
              <div class="tl-role">${[e.role, e.location].filter(Boolean).join(' · ')}</div>
              ${e.desc ? `<div class="tl-desc">${e.desc}</div>` : ''}
            </div>
          </div>`).join('')}
      </div>
    </section>`;
  }

  function renderProjects(items) {
    return `
    <section id="projects" class="section">
      <h2 class="section-heading">Projects</h2>
      <div class="projects-list">
        ${items.map(p => `
          <div class="project-item">
            <div class="project-icon">${abbrev(p.name)}</div>
            <div class="project-body">
              <div class="project-top"><span class="project-name">${p.name || ''}</span><span class="project-dates">${p.date || ''}</span></div>
              <div class="project-desc">${p.desc || ''}</div>
              ${p.tags ? `<div class="project-tags">${p.tags.split(',').map(t => `<span class="tag">${t.trim()}</span>`).join('')}</div>` : ''}
              ${(p.demo || p.github) ? `<div class="project-link-row">${p.demo ? `<a href="${p.demo}" target="_blank" class="plink">↗ Live Demo</a>` : ''}${p.github ? `<a href="${p.github}" target="_blank" class="plink">↗ GitHub</a>` : ''}</div>` : ''}
            </div>
          </div>`).join('')}
      </div>
    </section>`;
  }

  function renderEducation(d) {
    const items = d.education || [];
    const skills = d.skills || [];
    const langs = d.languages || [];
    return `
    <section id="education" class="section">
      <h2 class="section-heading">Education</h2>
      <div class="timeline">
        ${items.map(e => `
          <div class="timeline-item">
            <div class="tl-logo">${abbrev(e.school)}</div>
            <div class="tl-body">
              <div class="tl-top"><span class="tl-name">${e.school || ''}</span><span class="tl-date">${e.date || ''}</span></div>
              ${e.degree ? `<div class="tl-role">${e.degree}</div>` : ''}
              ${e.desc ? `<div class="tl-desc">${e.desc}</div>` : ''}
            </div>
          </div>`).join('')}
      </div>
    </section>
    ${(skills.length || langs.length) ? `
    <section id="skills" class="section">
      <h2 class="section-heading">Skills</h2>
      ${skills.length ? `<div class="skills-grid" style="margin-bottom:1rem;">${skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div>` : ''}
      ${langs.length ? `<div class="nav-label" style="margin-bottom:8px;">Languages</div><div class="skills-grid">${langs.map(l => `<span class="skill-tag">${l}</span>`).join('')}</div>` : ''}
    </section>` : ''}`;
  }

  function renderResume(d, p, c) {
    return `
    <section id="resume" class="section">
      <h2 class="section-heading">Resume</h2>
      <div class="resume-tabs">
        <button class="rtab active" onclick="switchResume('view',this)">View online</button>
        <button class="rtab" onclick="switchResume('download',this)">Download PDF</button>
      </div>

      <div id="resume-view" class="resume-pane visible">
        <div class="resume-header">
          <h2>${p.name || ''}</h2>
          <p style="font-size:0.85rem;color:var(--muted);">${[p.role, p.location].filter(Boolean).join(' · ')}</p>
          <div class="resume-contact-row">
            ${c.email ? `<a href="mailto:${c.email}">${c.email}</a>` : ''}
            ${c.phone ? `<span>${c.phone}</span>` : ''}
          </div>
        </div>

        ${d.summary ? `
        <div class="resume-block">
          <div class="resume-block-title">Summary</div>
          <p style="font-size:0.85rem;color:var(--muted);line-height:1.75;">${d.summary}</p>
        </div>` : ''}

        ${(d.experience||[]).length ? `
        <div class="resume-block">
          <div class="resume-block-title">Experience</div>
          ${(d.experience||[]).map(e => `
            <div class="r-entry">
              <div class="r-entry-top"><span class="r-entry-name">${e.role ? `${e.role} — ${e.org}` : e.org}</span><span class="r-entry-date">${e.date||''}</span></div>
              ${e.location ? `<div class="r-entry-sub">${e.location}</div>` : ''}
              ${e.desc ? `<div class="r-entry-desc">${e.desc}</div>` : ''}
            </div>`).join('')}
        </div>` : ''}

        ${(d.education||[]).length ? `
        <div class="resume-block">
          <div class="resume-block-title">Education</div>
          ${(d.education||[]).map(e => `
            <div class="r-entry">
              <div class="r-entry-top"><span class="r-entry-name">${e.school||''}</span><span class="r-entry-date">${e.date||''}</span></div>
              ${e.degree ? `<div class="r-entry-sub">${e.degree}</div>` : ''}
              ${e.desc ? `<div class="r-entry-desc">${e.desc}</div>` : ''}
            </div>`).join('')}
        </div>` : ''}

        ${(d.projects||[]).length ? `
        <div class="resume-block">
          <div class="resume-block-title">Projects</div>
          ${(d.projects||[]).map(p => `
            <div class="r-entry">
              <div class="r-entry-top"><span class="r-entry-name">${p.name||''}</span><span class="r-entry-date">${p.date||''}</span></div>
              ${p.desc ? `<div class="r-entry-desc">${p.desc}</div>` : ''}
            </div>`).join('')}
        </div>` : ''}

        ${(d.skills||[]).length ? `
        <div class="resume-block">
          <div class="resume-block-title">Skills</div>
          <div class="skills-grid">${(d.skills||[]).map(s => `<span class="skill-tag">${s}</span>`).join('')}</div>
        </div>` : ''}

        ${(d.languages||[]).length ? `
        <div class="resume-block">
          <div class="resume-block-title">Languages</div>
          <div class="skills-grid">${(d.languages||[]).map(l => `<span class="skill-tag">${l}</span>`).join('')}</div>
        </div>` : ''}
      </div>

      <div id="resume-download" class="resume-pane">
        <div class="download-bar">
          <span>Resume — ${p.name || 'Portfolio'}</span>
          <a href="${d.resumeUrl}" target="_blank" download class="download-btn">⬇ Download PDF</a>
        </div>
      </div>
    </section>`;
  }

  function renderContact(c) {
    const links = [
      c.email && `<a href="mailto:${c.email}" class="contact-link">✉ ${c.email}</a>`,
      c.phone && `<a href="tel:${c.phone}" class="contact-link">📞 ${c.phone}</a>`,
      c.linkedin && `<a href="${c.linkedin}" target="_blank" class="contact-link">in LinkedIn</a>`,
      c.github && `<a href="${c.github}" target="_blank" class="contact-link">⌥ GitHub</a>`,
      c.twitter && `<a href="${c.twitter}" target="_blank" class="contact-link">𝕏 Twitter</a>`,
      c.website && `<a href="${c.website}" target="_blank" class="contact-link">🌐 Website</a>`,
    ].filter(Boolean).join('');
    return `
    <section id="contact" class="section">
      <h2 class="section-heading">Contact</h2>
      <p class="contact-note">Feel free to reach out${c.email ? ` — <a href="mailto:${c.email}">send an email</a>` : ''} and I'll get back to you.</p>
      <div class="contact-grid">${links}</div>
    </section>`;
  }

  function switchResume(tab, btn) {
    document.querySelectorAll('.rtab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('resume-view').classList.toggle('visible', tab === 'view');
    document.getElementById('resume-download').classList.toggle('visible', tab === 'download');
  }

  function setupScrollSpy(ids) {
    window.addEventListener('scroll', () => {
      let active = ids[0];
      ids.forEach(id => {
        const el = document.getElementById(id);
        if (el && el.getBoundingClientRect().top < 140) active = id;
      });
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.toggle('active', el.getAttribute('href') === '#' + active);
      });
    }, { passive: true });
  }

  loadPortfolio();
</script>
</body>
</html>
